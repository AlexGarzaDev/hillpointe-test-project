version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hillpointe-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hillpointe_user
      POSTGRES_PASSWORD: hillpointe_password
      POSTGRES_DB: hillpointe_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hillpointe_user -d hillpointe_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hillpointe

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_SSL=false
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=hillpointe_user
      - DB_PASSWORD=hillpointe_password
      - DB_NAME=hillpointe_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/version', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - hillpointe

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://api:3000
    networks:
      - hillpointe

volumes:
  postgres_data:

networks:
  hillpointe:
    driver: bridge
