version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hillpointe-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hillpointe_user
      POSTGRES_PASSWORD: hillpointe_password
      POSTGRES_DB: hillpointe_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hillpointe_user -d hillpointe_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
